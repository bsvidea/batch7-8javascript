<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        var day=1;
        function updateday()
        {
            var x=document.getElementById("headtext");
            x.innerText="Learning Javascript Day "+day;
            day++;
        }
    </script>
</head>
<body>
    <h1 id="headtext">Learning Javascript Day 1</h1>
    <button onclick="updateday()">+</button>
</body>
</html>
