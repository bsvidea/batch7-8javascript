<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #gamebox
        {
            width: 32vw;
            margin: auto;
        }
        .box
        {
            width: 10vw;
            height: 10vw;
            background-color: bisque;
            border: .1vw solid black;
            margin: .2vw;
        }
        .rowline
        {
            display: flex;
        }
    </style>
    <script>
        function setupgame()
        {
            for(i=0;i<3;i++)
            {
                var rowobj=document.createElement('div');
                rowobj.className='rowline';
                for(j=0;j<3;j++)
                {
                    var obj=document.createElement('div');
                    obj.className='box';
                    rowobj.appendChild(obj);   
                }
                document.getElementById("gamebox").appendChild(rowobj);
            }
        }
    </script>
</head>
<body onload="setupgame()">
    <div id="gamebox">

    </div>
</body>
</html>
