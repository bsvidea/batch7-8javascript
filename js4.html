<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: blue;
            text-align: center;
        }
    </style>
    <script>
        function changecolor(clr)
        {
            var x=document.getElementById("myhead");
            x.style.backgroundColor=clr;
        }
    </script>
</head>
<body>
    <h1 id="myhead">JAVASCRIPT</h1>
    <div>
        <input type="radio" name="colors" onclick="changecolor('red')">
        <label>RED</label>
        <input type="radio" name="colors" onclick="changecolor('green')">
        <label>GREEN</label>
        <input type="radio" name="colors" onclick="changecolor('blue')"> 
        <label>BLUE</label>
        
    </div>
</body>
</html>
